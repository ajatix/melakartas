<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
  <title>Melakartas in Carnatic Music</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="audioUnlockOverlay" class="audio-unlock-overlay" aria-hidden="false">
    <button type="button" id="audioUnlockBtn" class="audio-unlock-btn" aria-label="Enable sound">
      <span class="audio-unlock-text">Tap to enable sound</span>
      <span class="audio-unlock-hint">Required for piano and playback on this device</span>
    </button>
  </div>
  <div class="app">
    <header class="header">
      <h1>Melakartas in Carnatic Music</h1>
      <button type="button" id="sidebarToggle" class="sidebar-toggle" aria-label="Open settings">⚙ Settings</button>
    </header>

    <div class="main-with-sidebar">
      <main class="main-content">
        <section class="dials-section">
          <div class="clock-dials" aria-label="Raga selector dials">
            <div class="dial dial-m">
              <div class="dial-controls">
                <button type="button" id="dialMUp" class="dial-btn dial-btn-up" aria-label="Increase M">▲</button>
                <div class="dial-value-row">
                  <span id="dialMValue" class="dial-value">M1</span>
                </div>
                <button type="button" id="dialMDown" class="dial-btn dial-btn-down" aria-label="Decrease M">▼</button>
              </div>
              <span class="dial-caption">Madhyamam</span>
            </div>
            <div class="dial dial-rg">
              <div class="dial-controls">
                <button type="button" id="dialRgUp" class="dial-btn dial-btn-up" aria-label="Increase R-G">▲</button>
                <div class="dial-value-row">
                  <span id="dialRgValue" class="dial-value">R1-G1</span>
                </div>
                <button type="button" id="dialRgDown" class="dial-btn dial-btn-down" aria-label="Decrease R-G">▼</button>
              </div>
              <span class="dial-caption dial-caption-two-lines"><span class="dial-caption-line">Rishabham</span><span class="dial-caption-line">Gandharam</span></span>
            </div>
            <div class="dial dial-dn">
              <div class="dial-controls">
                <button type="button" id="dialDnUp" class="dial-btn dial-btn-up" aria-label="Increase D-N">▲</button>
                <span id="dialDnValue" class="dial-value">D1-N1</span>
                <button type="button" id="dialDnDown" class="dial-btn dial-btn-down" aria-label="Decrease D-N">▼</button>
              </div>
              <span class="dial-caption dial-caption-two-lines"><span class="dial-caption-line">Dhaivatam</span><span class="dial-caption-line">Nishadam</span></span>
            </div>
          </div>
        </section>

        <section class="piano-section">
          <div class="piano-container">
            <div id="piano" class="piano piano-labels-western"></div>
          </div>
          <div class="play-buttons">
            <button type="button" id="btnPlayAsc" aria-label="Play Arohanam">Arohanam</button>
            <div class="play-transpose-control">
              <button type="button" id="btnTransposePrev" class="transpose-arrow" aria-label="Previous transpose">◀</button>
              <span id="transposeLabel" class="play-transpose-label" aria-live="polite">C</span>
              <button type="button" id="btnTransposeNext" class="transpose-arrow" aria-label="Next transpose">▶</button>
            </div>
            <button type="button" id="btnPlayDesc" aria-label="Play Avarohanam">Avarohanam</button>
          </div>
        </section>

        <section class="raga-description">
          <div class="raga-info">
            <div class="raga-number" id="ragaNumber">Raga 1</div>
            <div class="raga-name" id="ragaName">Kanakangi</div>
            <div class="raga-meta-row">
              <span class="raga-meta-label">Chakra:</span>
              <span class="raga-meta" id="ragaChakra"></span>
            </div>
            <div class="raga-scale-row raga-row-arohanam" id="ragaRowArohanam">
              <span class="raga-scale-label">Arohanam:</span>
              <span class="raga-scale" id="ragaArohanam">S R1 G1 M1 P D1 N1 Ṡ</span>
            </div>
            <div class="raga-scale-row raga-row-avarohanam" id="ragaRowAvarohanam">
              <span class="raga-scale-label">Avarohanam:</span>
              <span class="raga-scale" id="ragaAvarohanam">Ṡ N1 D1 P M1 G1 R1 S</span>
            </div>
            <p class="raga-phrase" id="ragaPhrase"></p>
            <div class="raga-meta-row raga-equivalent-row" id="ragaRowHindustani">
              <span class="raga-meta-label">Hindustani:</span>
              <span class="raga-meta" id="ragaHindustani"></span>
            </div>
            <div class="raga-meta-row raga-equivalent-row" id="ragaRowWestern">
              <span class="raga-meta-label">Western:</span>
              <span class="raga-meta" id="ragaWestern"></span>
            </div>
            <div class="raga-meta-row">
              <span class="raga-meta-label">Origin:</span>
              <span class="raga-meta" id="ragaComposerYear"></span>
            </div>
            <div class="raga-meta-row">
              <span class="raga-meta-label">Time of day:</span>
              <span class="raga-meta" id="ragaTimeOfDay"></span>
            </div>
          </div>
        </section>

        <div class="nav-row nav-row-bottom">
          <div class="nav-buttons">
            <button type="button" id="btnPrev" aria-label="Previous raga">← Prev</button>
            <button type="button" id="btnNext" aria-label="Next raga">Next →</button>
            <button type="button" id="btnRandom" aria-label="Random raga">Random</button>
          </div>
          <div class="raga-select-panel">
            <br/>
            <input type="text" id="ragaSearchInput" class="raga-search-input" placeholder="Search ragas..." autocomplete="off" aria-label="Search ragas">
            <div id="ragaListContainer" class="raga-list-container" aria-label="Raga list">
              <ul id="ragaList" class="raga-list"></ul>
            </div>
          </div>
        </div>
      </main>

      <div id="settingsOverlay" class="settings-overlay" aria-hidden="true">
        <aside class="settings-panel" aria-label="Settings">
          <div class="settings-panel-header">
            <h2 class="sidebar-title">Settings</h2>
            <button type="button" id="settingsClose" class="settings-close" aria-label="Close settings">×</button>
          </div>
          <div class="sidebar-content">
          <div class="sidebar-group">
            <label for="bpmInput">Tempo (BPM)</label>
            <input type="number" id="bpmInput" min="40" max="240" value="80">
          </div>
          <div class="sidebar-group">
            <label for="reverbInput">Reverb</label>
            <input type="range" id="reverbInput" min="0" max="100" value="0" aria-label="Reverb amount">
            <span id="reverbValue" class="reverb-value">0%</span>
          </div>
          <div class="sidebar-group">
            <span class="sidebar-group-label">Transpose Starting Sa</span>
            <div id="rootNoteGroup" class="root-note-group" role="radiogroup" aria-label="Transpose starting Sa (root)"></div>
          </div>
          <div class="sidebar-group">
            <span class="sidebar-group-label">Instrument</span>
            <div id="instrumentGroup" class="instrument-btn-group" role="group" aria-label="Instrument sound">
              <button type="button" class="instrument-btn selected" data-instrument="piano" aria-label="Piano" title="Piano">🎹</button>
              <button type="button" class="instrument-btn" data-instrument="guitar" aria-label="Guitar" title="Guitar">🎸</button>
              <button type="button" class="instrument-btn" data-instrument="veena" aria-label="Veena" title="Veena">🎵</button>
              <button type="button" class="instrument-btn" data-instrument="violin" aria-label="Violin" title="Violin">🎻</button>
            </div>
          </div>
        </div>
        </aside>
      </div>
    </div>
  </div>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
